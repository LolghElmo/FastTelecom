name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run Nuke Pack
        run: ./build.cmd Pack --version ${{ steps.version.outputs.VERSION }} --runtime win-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-win
          path: releases/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run Nuke Pack
        run: ./build.sh Pack --version ${{ steps.version.outputs.VERSION }} --runtime linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-linux
          path: releases/*

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        runtime: [osx-x64, osx-arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run Nuke Pack
        run: ./build.sh Pack --version ${{ steps.version.outputs.VERSION }} --runtime ${{ matrix.runtime }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.runtime }}
          path: releases/*

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            releases/*
          generate_release_notes: true
          body: |
            ## Download

            | Platform | Download |
            |----------|----------|
            | Windows (installer) | [`FastTelecom-win-Setup.exe`](https://github.com/LolghElmo/FastTelecom/releases/download/${{ github.ref_name }}/FastTelecom-win-Setup.exe) |
            | Windows (portable) | [`FastTelecom-win-Portable.zip`](https://github.com/LolghElmo/FastTelecom/releases/download/${{ github.ref_name }}/FastTelecom-win-Portable.zip) |
            | Linux | [`FastTelecom.AppImage`](https://github.com/LolghElmo/FastTelecom/releases/download/${{ github.ref_name }}/FastTelecom.AppImage) |
            | macOS (Apple Silicon) | [`FastTelecom-osx-arm64-Setup.pkg`](https://github.com/LolghElmo/FastTelecom/releases/download/${{ github.ref_name }}/FastTelecom-osx-arm64-Setup.pkg) |
            | macOS (Intel) | [`FastTelecom-osx-x64-Setup.pkg`](https://github.com/LolghElmo/FastTelecom/releases/download/${{ github.ref_name }}/FastTelecom-osx-x64-Setup.pkg) |

            ---

            ### Installation

            **Windows:** Run `FastTelecom-win-Setup.exe` — updates are automatic.

            **Linux:**
            ```bash
            chmod +x FastTelecom.AppImage
            ./FastTelecom.AppImage
            ```

            **macOS:** Run the `.pkg` installer. If macOS blocks it:
            1. Open **System Settings** → **Privacy & Security**
            2. Scroll down and click **Open Anyway** next to the FastTelecom message
            — or run in Terminal:
            ```bash
            sudo xattr -cr /Applications/FastTelecom.app
            ```

            > Other files listed below are for auto-updates and can be ignored.
