name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for MinVer to read full git tag history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Parcel
        run: dotnet tool install --global AvaloniaUI.Parcel

      - name: Install Parcel packaging tools
        working-directory: FastTelecom.AvaloniaUI
        run: parcel install-tools -r win-x64 -p nsis -p zip

      - name: Package for Windows
        working-directory: FastTelecom.AvaloniaUI
        env:
          PARCEL_LICENSE_KEY: ${{ secrets.PARCEL_LICENSE_KEY }}
        run: parcel pack FastTelecom.AvaloniaUI.parcel -r win-x64 -p nsis -p zip -o ./artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            FastTelecom.AvaloniaUI/artifacts/*.exe
            FastTelecom.AvaloniaUI/artifacts/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for MinVer to read full git tag history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Parcel
        run: dotnet tool install --global AvaloniaUI.Parcel

      - name: Install Parcel packaging tools
        working-directory: FastTelecom.AvaloniaUI
        run: parcel install-tools -r linux-x64 -p deb -p zip

      - name: Package for Linux
        working-directory: FastTelecom.AvaloniaUI
        env:
          PARCEL_LICENSE_KEY: ${{ secrets.PARCEL_LICENSE_KEY }}
        run: parcel pack FastTelecom.AvaloniaUI.parcel -r linux-x64 -p deb -p zip -o ./artifacts

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            FastTelecom.AvaloniaUI/artifacts/*.deb
            FastTelecom.AvaloniaUI/artifacts/*.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: ./artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
